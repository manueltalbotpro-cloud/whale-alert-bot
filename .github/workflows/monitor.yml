name: Whale Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # surveillance whale toutes les 5 min (throttlé par GitHub ~6x/jour)
    - cron: '0 10 * * *'    # rapport quotidien garanti à 10h UTC (= 12h heure française)
  workflow_dispatch:          # déclenchement manuel possible

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --production

      - name: Run whale checker
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LAST_BTC_PRICE:   ${{ vars.LAST_BTC_PRICE }}
          SEND_STATUS:      ${{ (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * *') && 'true' || 'false' }}
        run: node checker.js
